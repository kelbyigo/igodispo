<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit a Deal — Igo Dispo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a; --surface: #141414; --accent: #9AE600;
  --accent-soft: rgba(154,230,0,0.1); --text: #e8e8e8;
  --text-muted: #777; --border: #222; --radius: 10px; --radius-sm: 8px;
}
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
.container { max-width: 680px; margin: 0 auto; padding: 0 24px; }

/* NAV */
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(10,10,10,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 14px 0; }
.nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
.nav-logo { display: flex; align-items: center; text-decoration: none; flex-shrink: 0; }
.nav-back { color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
.nav-back:hover { color: var(--accent); }

/* PAGE */
.page-wrap { padding: 120px 0 80px; }
.page-header { text-align: center; margin-bottom: 48px; }
.page-header .badge { display: inline-block; padding: 5px 14px; background: var(--accent-soft); border: 1px solid rgba(154,230,0,0.3); border-radius: 100px; color: var(--accent); font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
.page-header h1 { font-size: 36px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 12px; }
.page-header p { color: var(--text-muted); font-size: 16px; }

/* FORM */
.form-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; }
.section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2.5px; color: var(--accent); font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.form-field label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
.form-field input, .form-field textarea {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 12px 16px; color: var(--text); font-size: 15px; font-family: inherit;
  transition: border-color 0.2s; width: 100%;
}
.form-field input:focus, .form-field textarea:focus { outline: none; border-color: var(--accent); }
.form-field input::placeholder, .form-field textarea::placeholder { color: var(--text-muted); opacity: 0.6; }
.form-field textarea { resize: vertical; min-height: 110px; }
.form-divider { margin: 24px 0; }
.submit-btn {
  width: 100%; padding: 16px; background: var(--accent); color: #000;
  font-size: 16px; font-weight: 700; font-family: inherit; border: none;
  border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s; margin-top: 8px;
}
.submit-btn:hover { background: #a8f010; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(154,230,0,0.25); }
.form-note { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-muted); }
.form-note a { color: var(--accent); text-decoration: none; }

@media (max-width: 600px) {
  .form-row { grid-template-columns: 1fr; }
  .form-card { padding: 24px 20px; }
  .page-header h1 { font-size: 28px; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo" aria-label="Igo Dispo home">
      <svg width="110" height="44" viewBox="0 0 110 44" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g opacity="0.9">
          <rect x="2" y="10" width="5" height="22" rx="1" fill="#9AE600" transform="rotate(-15 2 10)"/>
          <rect x="9" y="7" width="5" height="26" rx="1" fill="#9AE600" opacity="0.7" transform="rotate(-15 9 7)"/>
          <rect x="16" y="10" width="5" height="22" rx="1" fill="#9AE600" opacity="0.4" transform="rotate(-15 16 10)"/>
        </g>
        <text x="30" y="20" font-family="DM Sans, sans-serif" font-weight="700" font-size="16" letter-spacing="3" fill="#e8e8e8">IGO</text>
        <text x="30" y="38" font-family="DM Sans, sans-serif" font-weight="700" font-size="16" letter-spacing="3" fill="#9AE600">DISPO</text>
      </svg>
    </a>
    <a href="/" class="nav-back">← Back to home</a>
  </div>
</nav>

<div class="page-wrap">
  <div class="container">
    <div class="page-header">
      <div class="badge">Submit a Deal</div>
      <h1>Tell us about the property.</h1>
      <p>Fill this out and we'll come back within 48 hours with a yes or no.</p>
    </div>

    <!-- REPLACE: swap action to GHL webhook URL when ready -->
    <form class="form-card" action="mailto:amanda@igodispo.com" method="post" enctype="text/plain">

      <div class="section-label">Your Info</div>
      <div class="form-row">
        <div class="form-field">
          <label for="f_first">First Name</label>
          <input type="text" id="f_first" name="First Name" placeholder="John" required>
        </div>
        <div class="form-field">
          <label for="f_last">Last Name</label>
          <input type="text" id="f_last" name="Last Name" placeholder="Smith" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label for="f_email">Email</label>
          <input type="email" id="f_email" name="Email" placeholder="you@email.com" required>
        </div>
        <div class="form-field">
          <label for="f_phone">Phone</label>
          <input type="tel" id="f_phone" name="Phone" placeholder="(555) 000-0000" required>
        </div>
      </div>

      <div class="form-divider">
        <div class="section-label">The Deal</div>
      </div>
      <div class="form-field">
        <label for="f_address">Property Address</label>
        <input type="text" id="f_address" name="Property Address" placeholder="123 Main St, City, State ZIP" required>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label for="f_price">Asking Price</label>
          <input type="text" id="f_price" name="Asking Price" placeholder="$120,000" required>
        </div>
        <div class="form-field">
          <label for="f_arv">ARV (After Repair Value)</label>
          <input type="text" id="f_arv" name="ARV" placeholder="$200,000" required>
        </div>
      </div>
      <div class="form-field">
        <label for="f_notes">Notes</label>
        <textarea id="f_notes" name="Notes" placeholder="Condition, timeline, seller situation — anything that helps us move fast."></textarea>
      </div>

      <button type="submit" class="submit-btn">Submit My Deal →</button>
      <p class="form-note">Or reach us directly: <a href="tel:+19287568136">(928) 756-8136</a> · <a href="mailto:amanda@igodispo.com">amanda@igodispo.com</a></p>
    </form>
  </div>
</div>

</body>
</html>
